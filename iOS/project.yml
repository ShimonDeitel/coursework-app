name: CourseworkLog
options:
  bundleIdPrefix: com.shimondeitel.courseworklog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CourseworkLog:
    type: application
    platform: iOS
    sources:
      - path: CourseworkLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.courseworklog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CourseworkLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CourseworkLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CourseworkLogTests
      - path: CourseworkLog.storekit
    dependencies:
      - target: CourseworkLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.courseworklog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CourseworkLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CourseworkLogUITests
    dependencies:
      - target: CourseworkLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.courseworklog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CourseworkLog:
    build:
      targets:
        CourseworkLog: all
        CourseworkLogTests: [test]
        CourseworkLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CourseworkLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CourseworkLog.storekit
      targets:
        - CourseworkLogTests
        - CourseworkLogUITests
    archive:
      config: Release
